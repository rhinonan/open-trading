# 在 GitHub Actions 构建镜像并推到 GHCR；香港等弱服务器只 pull，不再 --build。
# 镜像：ghcr.io/rhinonan/open-trading（与 github.repository 一致，全小写）
name: Build and push Docker image

on:
  push:
    branches: [main]
    # 仅业务/镜像相关路径变更才构建；改 CLAUDE.md、docs 等不打镜像。
    # 注意：paths 不对 tag 推送生效，打 v* tag 仍会构建。
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "public/**"
      - "scripts/docker-entrypoint.mjs"
      - "drizzle/**"
      - "drizzle.config.ts"
      - "next.config.ts"
      - "tsconfig.json"
      - "postcss.config.*"
      - "components.json"
      - ".github/workflows/docker-publish.yml"
    tags: ["v*"]
  workflow_dispatch: # 强制发版：Actions 页手动 Run

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
