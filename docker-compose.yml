# 生产 / 服务器：只拉取预构建镜像，不在弱机上 --build。
# 镜像由 GitHub Actions 推到 GHCR（见 .github/workflows/docker-publish.yml）。
# 本地开发请用 pnpm dev；应急本机构建见 DEPLOY.md「可选：本机构建」。
services:
  open-trading:
    image: ghcr.io/rhinonan/open-trading:latest
    container_name: open-trading
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3002
      - HOSTNAME=0.0.0.0
      # 与挂载卷一致；业务库 / 缓存 / 音视频 / mastra.db 都在此下
      - DATA_ROOT=/app/data
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped
    pull_policy: always
