services:
  open-trading:
    build: .
    container_name: open-trading
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3002
      - HOSTNAME=0.0.0.0
      # 与挂载卷一致；业务库 / 缓存 / 音视频 / mastra.db 都在此下
      - DATA_ROOT=/app/data
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped
